<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigTimeFM App - Total Height Fix</title>
    <style>
        :root {
            --orange-glow: #ff8c00;
            --bg-dark: #121212;
            --border-color: rgba(255, 255, 255, 0.7);
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 30px;
            row-gap: 10px;
        }

        .fieldset-box {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            background: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Cover-Box Höhe reduziert, damit sie nicht übersteht */
        .cover-box {
            max-width: 180px;
            height: 140px; 
            margin: 0 auto;
            padding: 5px;
        }

        .fieldset-label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--bg-dark);
            padding: 0 6px;
            font-size: 0.8rem;
            color: #bbb;
        }

        /* Alle Buttons (auch Tracks) mit identischer Höhe */
        .modern-btn {
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            height: 38px; /* FIXE HÖHE FÜR ALLE */
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0; /* Padding weg, da Höhe fixiert ist */
        }

        .modern-btn:last-child { margin-bottom: 0; }
        .modern-btn:hover { border-color: var(--orange-glow); }
        .modern-btn.is-active { color: var(--orange-glow); border-color: var(--orange-glow); }

        .cover-only {
            width: 105px;
            height: 105px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin: 0 auto;
            display: block;
            object-fit: cover;
        }

        .nav-grid {
            grid-column: span 2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 5px;
        }

        .content-frame-box {
            grid-column: span 2;
            height: 400px;
            border: 1px solid var(--border-color);
            background: black;
            border-radius: 4px;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="column">
        <div class="fieldset-box">
            <span class="fieldset-label">Schnellzugriff</span>
            <button class="modern-btn" onclick="window.open('https://bigtimefm.de')">🌐 Website</button>
            <button class="modern-btn" onclick="switchTab('tab2')">✉️ Wunschbox</button>
        </div>

        <div class="fieldset-box" style="margin-top: 15px;">
            <span class="fieldset-label">Radiosteuerung</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button class="modern-btn" onclick="document.getElementById('player').play()">▶ PLAY</button>
                <button class="modern-btn" onclick="document.getElementById('player').pause()">◼ STOPP</button>
            </div>
            <input type="range" style="width:100%; margin-top: 8px; accent-color:var(--orange-glow)" oninput="document.getElementById('player').volume = this.value/100">
            <audio id="player" src="https://stream.bigtimefm.de/stream.mp3"></audio>
        </div>
    </div>

    <div class="column">
        <div class="fieldset-box cover-box">
            <span class="fieldset-label">Radioinformationen</span>
            <img id="api_cover" class="cover-only" src="https://backend.bigtimefm.de/api/?output=cover" alt="Cover">
        </div>
    </div>

    <nav class="nav-grid">
        <button class="modern-btn is-active" onclick="switchTab('tab0', this)">Home</button>
        <button class="modern-btn" onclick="switchTab('tab1', this)">Plan</button>
        <button class="modern-btn" onclick="switchTab('tab2', this)">Wunsch</button>
        <button class="modern-btn" onclick="switchTab('tab3', this)">Tracks</button>
    </nav>

    <div class="content-frame-box">
        <iframe id="main_frame" src="https://bigtimefm.de/mobile/infos.php"></iframe>
    </div>
</div>

<script>
    function switchTab(id, btn) {
        const urls = {
            'tab0': 'https://bigtimefm.de/mobile/infos.php',
            'tab1': 'https://bigtimefm.de/mobile/sendeplan.php',
            'tab2': 'https://bigtimefm.de/mobile/wunschbox.php',
            'tab3': 'https://bigtimefm.de/mobile/trackliste.php'
        };
        document.getElementById('main_frame').src = urls[id];
        if(btn) {
            document.querySelectorAll('.nav-grid .modern-btn').forEach(b => b.classList.remove('is-active'));
            btn.classList.add('is-active');
        }
    }

    function update() {
        document.getElementById('api_cover').src = 'https://backend.bigtimefm.de/api/?output=cover&t=' + Date.now();
    }
    setInterval(update, 15000);
</script>

</body>
</html>
