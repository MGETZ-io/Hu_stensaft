<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigTimeFM Player</title>
    <style>
        :root {
            --accent: #ff8c00;
            --bg: #000;
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 140, 0, 0.4);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white; overflow: hidden;
            background: #000;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: url('bg.png') center/cover no-repeat;
            filter: blur(1px) brightness(0.4);
            z-index: -1;
        }

        /* Auswahl-Menü */
        #selector {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; gap: 30px; align-items: center; justify-content: center;
        }

        .select-card {
            width: 250px; height: 300px; background: #111; border: 2px solid #333;
            border-radius: 30px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }

        .select-card:hover { border-color: var(--accent); transform: scale(1.05); }

        /* Player Layout */
        #player-interface {
            display: none; height: 100vh; flex-direction: column; padding: 30px; box-sizing: border-box;
        }

        .grid-container {
            display: grid; grid-template-columns: 400px 1fr; gap: 30px;
            height: calc(100vh - 180px); max-width: 1400px; margin: 0 auto; width: 100%;
        }

        .card {
            background: var(--glass); border: 2px solid var(--border);
            border-radius: 35px; overflow: hidden; display: flex; flex-direction: column;
        }

        .cover-card { align-items: center; justify-content: center; padding: 30px; }

        .player-cover {
            width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover;
            border: 1px solid var(--border);
        }

        .tracklist-card { padding: 25px; }
        .track-scroll { overflow-y: auto; flex: 1; }

        .track-item {
            display: flex; align-items: center; padding: 12px;
            border-bottom: 1px solid rgba(255,140,0,0.1); gap: 15px;
        }

        /* Iframe Styling */
        #junior-frame {
            width: 100%; height: 100%; border: none; background: transparent;
        }

        .player-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 60px); max-width: 1400px; height: 100px;
            background: var(--glass); border: 2px solid var(--border);
            border-radius: 30px; display: flex; align-items: center; padding: 0 40px; gap: 30px;
        }

        .song-info { flex: 1; min-width: 0; }
        .song-title { font-size: 1.4rem; font-weight: bold; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dj-name { color: var(--accent); font-size: 1rem; }

        .play-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .vol-box { display: flex; align-items: center; gap: 10px; width: 200px; }
        input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }

        .btn-back { position: absolute; top: 30px; right: 30px; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 10px; cursor: pointer; z-index: 100; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div id="selector">
    <div class="select-card" onclick="setSender('main')">
        <span style="font-size: 4rem;">📻</span>
        <h2 style="color:var(--accent)">MAINSTREAM</h2>
    </div>
    <div class="select-card" onclick="setSender('junior')">
        <span style="font-size: 4rem;">🎧</span>
        <h2 style="color:var(--accent)">JUNIOR</h2>
    </div>
</div>

<div id="player-interface">
    <button class="btn-back" onclick="resetApp()">← SENDER WECHSELN</button>
    <div class="grid-container">
        <div class="card cover-card">
            <img id="cover-img" class="player-cover" src="">
            <div style="margin-top: 20px;"><div id="bitrate-info" style="color: var(--accent); font-size: 0.8rem; border: 1px solid; padding: 4px 10px; border-radius: 10px;">- kbps</div></div>
        </div>
        <div class="card tracklist-card">
            <h3 id="list-header" style="margin: 0 0 20px 0; color: var(--accent);">ZULETZT GELAUFEN</h3>
            <div class="track-scroll" id="tracklist-container">
                </div>
        </div>
    </div>
    <div class="player-bar">
        <button class="play-btn" onclick="togglePlay()">
            <svg id="play-icon" viewBox="0 0 24 24" width="30"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="song-info">
            <p id="song-title" class="song-title">Lade...</p>
            <span id="dj-name" class="dj-name">...</span>
        </div>
        <div class="vol-box">
            <span>🔈</span>
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVol(this.value)">
            <span>🔊</span>
        </div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
const audio = document.getElementById('player');
const config = {
    main: {
        status: 'https://backend.bigtimefm.de/api/?output=radiostatus',
        cover: 'https://backend.bigtimefm.de/api/?output=cover',
        list: 'https://backend.bigtimefm.de/api/?output=tracklist',
        stream: 'https://stream.bigtimefm.de/stream.mp3',
        name: 'Mainstream'
    },
    junior: {
        status: 'https://junior.bigtimefm.de/api/?output=radiostatus',
        cover: 'https://junior.bigtimefm.de/api/?output=cover',
        list: 'https://junior.bigtimefm.de/api/?output=tracklist', // Wird als Iframe genutzt
        stream: 'https://stream.bigtimefm.de/btfm_junior.mp3',
        name: 'Junior'
    }
};

let currentSender = null;
let lastBlobUrl = null;

// Initialisierung beim Laden
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const sender = params.get('sender');
    if(sender && config[sender]) {
        initPlayer(sender);
    }
};

function setSender(sender) {
    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?sender=' + sender;
    window.history.pushState({path:newUrl}, '', newUrl);
    initPlayer(sender);
}

function resetApp() {
    window.location.href = window.location.pathname;
}

function initPlayer(sender) {
    currentSender = sender;
    document.getElementById('selector').style.display = 'none';
    document.getElementById('player-interface').style.display = 'flex';
    document.getElementById('list-header').innerText = config[sender].name + " - ZULETZT GELAUFEN";
    
    // Iframe Handling für Junior
    const listContainer = document.getElementById('tracklist-container');
    if(sender === 'junior') {
        listContainer.innerHTML = `<iframe id="junior-frame" src="${config.junior.list}"></iframe>`;
    } else {
        listContainer.innerHTML = ''; // Wird per Update-Funktion befüllt
    }

    audio.src = config[sender].stream;
    audio.play().catch(() => console.log("Autoplay blockiert"));
    
    update();
    setInterval(update, 10000);
}

async function update() {
    if(!currentSender) return;
    const cfg = config[currentSender];
    
    try {
        // Status & Titel
        const sRes = await fetch(cfg.status);
        const sData = await sRes.json();
        const title = sData.songtitle || "Kein Titel";
        document.getElementById('song-title').innerText = title;
        document.getElementById('dj-name').innerText = "👤 " + (sData.currentdj || "Auto-DJ");
        document.getElementById('bitrate-info').innerText = (sData.bitrate || "192") + " kbps";
        document.title = "🎶 " + title;

        // Cover
        const cRes = await fetch(cfg.cover);
        if(cRes.ok) {
            const blob = await cRes.blob();
            if(lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
            lastBlobUrl = URL.createObjectURL(blob);
            document.getElementById('cover-img').src = lastBlobUrl;
        }

        // Tracklist nur für Main manuell updaten (Junior ist Iframe)
        if(currentSender === 'main') {
            const lRes = await fetch(cfg.list);
            const lData = await lRes.json();
            document.getElementById('tracklist-container').innerHTML = lData.slice(0, 10).map(t => `
                <div class="track-item">
                    <span>🎵</span>
                    <div style="flex:1; display:flex; justify-content:space-between">
                        <span>${t.artist} - ${t.title}</span>
                        <span style="color:var(--accent)">${(t.time || "").substring(0,5)}</span>
                    </div>
                </div>
            `).join('');
        }
    } catch(e) { console.error("Update Error", e); }
}

function togglePlay() {
    const icon = document.getElementById('play-icon');
    if(audio.paused) {
        audio.play();
        icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    } else {
        audio.pause();
        icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    }
}

function setVol(v) { audio.volume = v; }
</script>
</body>
</html>
