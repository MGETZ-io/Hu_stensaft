<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigTimeFM - Web App</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-blue: #007aff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Liquid Glass Container */
        .app-container {
            width: 90vw;
            max-width: 1000px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: grid;
            grid-template-columns: 300px 1fr;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Sidebar / Navigation */
        .sidebar {
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-item {
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover { background: var(--glass-bg); }
        .nav-item.active { background: var(--accent-blue); }

        /* Main Content */
        .main-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
        }

        .cover-art {
            width: 250px;
            height: 250px;
            border-radius: 30px;
            background: #222;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cover-art.playing { transform: scale(1.05); }

        .now-playing { margin: 20px 0; }
        .song-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
        .artist-name { font-size: 1.2rem; opacity: 0.7; }

        /* Player Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .play-btn:active { transform: scale(0.9); }
        .play-btn svg { width: 40px; height: 40px; fill: black; }

        .status-badge {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid rgba(0, 255, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">BigTimeFM</h2>
        <div class="nav-item active" onclick="switchStream('main')">Main Stream</div>
        <div class="nav-item" onclick="switchStream('junior')">Junior Stream</div>
        <hr style="width: 100%; border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
        <div id="radio-status" class="status-badge">Lädt...</div>
    </div>

    <div class="main-content">
        <img id="cover" class="cover-art" src="https://via.placeholder.com/300" alt="Cover">
        
        <div class="now-playing">
            <div id="title" class="song-title">Wähle einen Stream</div>
            <div id="artist" class="artist-name">BigTimeFM - Dein Radio</div>
        </div>

        <div class="controls">
            <button class="play-btn" onclick="togglePlay()" id="playButton">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>

        <audio id="audio-player"></audio>
    </div>
</div>

<script>
    let currentMode = 'main';
    const audio = document.getElementById('audio-player');
    const playIcon = '<path d="M8 5v14l11-7z"/>';
    const pauseIcon = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

    const configs = {
        main: {
            stream: 'https://stream.bigtimefm.de/stream.mp3',
            api: 'https://backend.bigtimefm.de/api/?output=radiostatus',
            cover: 'https://backend.bigtimefm.de/api/?output=cover'
        },
        junior: {
            stream: 'https://stream.bigtimefm.de/btfm_junior.mp3',
            api: 'https://junior.bigtimefm.de/api/?output=radiostatus',
            cover: 'https://junior.bigtimefm.de/api/?output=cover'
        }
    };

    function switchStream(mode) {
        currentMode = mode;
        audio.src = configs[mode].stream;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        updateMetadata();
        if(!audio.paused) audio.play();
    }

    async function updateMetadata() {
        try {
            // Status & Titel laden
            const statusRes = await fetch(configs[currentMode].api);
            const statusData = await statusRes.text(); // Falls API Text/HTML liefert, sonst .json()
            document.getElementById('radio-status').innerText = "Online: " + currentMode.toUpperCase();
            
            // Cover laden
            const coverRes = await fetch(configs[currentMode].cover);
            const coverUrl = await coverRes.text();
            if(coverUrl.includes('http')) {
                document.getElementById('cover').src = coverUrl;
            }

            // Da Tracklist API oft JSON ist, hier beispielhaft für Titel:
            // (Hinweis: CORS muss serverseitig erlaubt sein!)
            document.getElementById('title').innerText = "Live Stream"; 
            document.getElementById('artist').innerText = "BigTimeFM " + currentMode;

        } catch (e) {
            console.error("API Error", e);
        }
    }

    function togglePlay() {
        const btn = document.getElementById('playIcon');
        if (audio.paused) {
            if(!audio.src) audio.src = configs[currentMode].stream;
            audio.play();
            btn.innerHTML = pauseIcon;
            document.getElementById('cover').classList.add('playing');
        } else {
            audio.pause();
            btn.innerHTML = playIcon;
            document.getElementById('cover').classList.remove('playing');
        }
    }

    // Auto-Update alle 30 Sekunden
    setInterval(updateMetadata, 30000);
    updateMetadata();
</script>

</body>
</html>
