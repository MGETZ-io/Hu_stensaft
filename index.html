<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsarbeiten | Hustensaft Jugend</title>
    <style>
        :root {
            --accent-yellow: #FFD700;
            --bg-dark: #0f0f0f;
            --text-main: #ffffff;
            --text-dim: #bbbbbb;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Container Positionierung wie bei Google Search */
        .main-content {
            margin-top: -50px; /* Leichter Versatz nach oben für die optische Mitte */
            padding: 20px;
        }

        /* Coole Animation */
        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid transparent;
            border-top: 4px solid var(--accent-yellow);
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            position: relative;
        }

        .loader::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 4px solid transparent;
            border-bottom: 4px solid var(--accent-yellow);
            border-radius: 50%;
            opacity: 0.5;
            animation: spin 2s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            color: var(--accent-yellow);
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 15px;
            max-width: 500px;
            line-height: 1.5;
        }

        .brand {
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Dezentere Unterinfo */
        .status-tag {
            margin-top: 40px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #333;
            text-transform: uppercase;
        }

        /* Google-Style Link (dezent) */
        .footer-links {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 15px;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--accent-yellow);
        }
    </style>
</head>
<body>

<div class="main-content">
    <div class="loader"></div>
    <h1>Wartungsarbeiten</h1>
    <p>Wir optimieren gerade die <span class="brand">Hustensaft Jugend</span> Projekte.<br>
       Schau in Kürze wieder vorbei.</p>
    
    <div class="status-tag">System-Status: Updating_Core...</div>
</div>

<div class="footer-links">
    <a href="/impressum">Impressum</a>
    <a href="https://discord.gg/deinlink">Discord</a>
    <a href="https://twitch.tv/deinkanal">Twitch</a>
</div>

</body>
</html>
